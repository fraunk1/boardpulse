<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}boardpulse{% endblock %}</title>

    <!-- Tailwind CSS (CDN for dev) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'fsmb-navy': {
                            DEFAULT: '#1B2636',
                            50:  '#F2F5F9',
                            100: '#DCE3ED',
                            200: '#C0CEDC',
                            300: '#97A8BD',
                            400: '#72849E',
                            500: '#576A83',
                            600: '#44546B',
                            700: '#354358',
                            800: '#2B3648',
                            900: '#1B2636',
                        },
                        'fsmb-teal': {
                            DEFAULT: '#139AD0',
                            400: '#3DB8E5',
                            500: '#139AD0',
                            600: '#0F7EB0',
                            700: '#0B6490',
                        },
                        'fsmb-gold': {
                            DEFAULT: '#FBAA29',
                            400: '#FCC254',
                            500: '#FBAA29',
                            600: '#E8950F',
                            700: '#C47D0A',
                        },
                    },
                    fontFamily: {
                        sans: ['"DM Sans"', 'system-ui', '-apple-system', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
                    },
                },
            },
        }
    </script>

    <!-- DM Sans + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>

    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>

    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Custom styles -->
    <link rel="stylesheet" href="/static/styles.css">

    {% block head %}{% endblock %}
</head>
<body class="h-full bg-white text-fsmb-navy font-sans antialiased">
    {% block body %}{% endblock %}

    <script>
        // Initialize Lucide icons after page load and after every HTMX swap
        document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
        document.addEventListener('htmx:afterSwap', () => {
            lucide.createIcons();
            renderMarkdownSummaries();
        });

        // Render Markdown summaries with marked.js
        function renderMarkdownSummaries() {
            document.querySelectorAll('.summary-content[data-markdown]').forEach(el => {
                if (el.dataset.rendered) return;
                const md = el.getAttribute('data-markdown');
                if (md && typeof marked !== 'undefined') {
                    el.innerHTML = marked.parse(md);
                    el.dataset.rendered = 'true';
                }
            });
        }
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
